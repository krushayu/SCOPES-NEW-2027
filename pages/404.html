<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page Not Found | SCOPES 2027</title>
  <link rel="icon" href="../assets/logos/scopes_logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; }
    .nf-wrap {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
    }
    @keyframes draw {
      0% { stroke-dashoffset: 600; fill-opacity: 0; }
      100% { stroke-dashoffset: 0; fill-opacity: 1; }
    }
    .cursive-text {
      stroke-dasharray: 600;
      stroke-dashoffset: 600;
      animation: draw 2s linear forwards;
    }
  </style>
</head>
<body>
  <div class="nf-wrap">
    <svg width="500" height="120" viewBox="0 0 500 120" fill="none">
      <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="cursive-text"
            font-size="44" font-family="'Pacifico', cursive" fill="#1e293b" stroke="#1e293b" stroke-width="1.2">
        No Content
      </text>
    </svg>
    <p style="text-align: center; font-family: sans-serif; font-size: 18px; color: #64748b; position: absolute; top: 60%; width: 100%;">
      Redirecting to homepage in 3 seconds...
    </p>
  </div>
  <script>
    setTimeout(() => { window.location.href = '../index.html'; }, 3000);
  </script>
</body>
</html>
